# Azure DevOps Pipeline – Backup & upload to Azure Blob Storage
#
# Prerequisites:
#   1. An Azure Storage Account with a container (e.g. "ado-backups").
#   2. A service connection named "AzureSubscription" with access to the storage account,
#      OR use workload identity federation / managed identity on a self-hosted agent.
#
# The pipeline runs the backup, compresses the output, then uploads
# the archive to Blob Storage using the AzureCLI task.

trigger: none  # Use schedules instead of push triggers for backup pipelines

schedules:
  - cron: "0 2 * * 0"
    displayName: Weekly Sunday 02:00 UTC
    branches:
      include:
        - main
    always: true

pool:
  vmImage: "ubuntu-latest"

variables:
  STORAGE_ACCOUNT: "yourstorageaccount"
  CONTAINER_NAME: "ado-backups"

steps:
  - task: UsePythonVersion@0
    inputs:
      versionSpec: "3.10"

  - script: az extension add -n azure-devops -y
    displayName: "Install Azure DevOps CLI extension"

  - script: |
      export PYTHONPATH=src
      python src/cli.py \
        --output-dir $(Build.ArtifactStagingDirectory)/ado-backup \
        --compress all \
        --max-items 500
    displayName: "Run ADO Backup"
    env:
      AZURE_DEVOPS_EXT_PAT: $(System.AccessToken)
      AZURE_DEVOPS_ORG_URL: $(System.CollectionUri)

  - task: AzureCLI@2
    displayName: "Upload backup indexes to Azure Blob Storage"
    inputs:
      azureSubscription: "AzureSubscription"
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        # Upload _indexes/ as raw blobs so the observability dashboard can read
        # manifest.json, inventory.json, errors.jsonl, and verification_report.json
        # without decompressing the archive.
        BACKUP_ROOT=$(Build.ArtifactStagingDirectory)/ado-backup
        INDEXES_DIR=$(find "$BACKUP_ROOT" -type d -name '_indexes' | head -1)
        if [ -n "$INDEXES_DIR" ]; then
          # Compute the blob prefix by stripping the local backup root
          BLOB_PREFIX=${INDEXES_DIR#"$BACKUP_ROOT/"}
          az storage blob upload-batch \
            --account-name $(STORAGE_ACCOUNT) \
            --destination $(CONTAINER_NAME) \
            --destination-path "$BLOB_PREFIX" \
            --source "$INDEXES_DIR" \
            --overwrite
        else
          echo "##vso[task.logissue type=warning]No _indexes directory found"
        fi

  - task: AzureCLI@2
    displayName: "Upload backup archive to Azure Blob Storage"
    inputs:
      azureSubscription: "AzureSubscription"
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        BACKUP_ROOT=$(Build.ArtifactStagingDirectory)/ado-backup
        ARCHIVE=$(find "$BACKUP_ROOT" -name '*.tar.gz' | head -1)
        if [ -z "$ARCHIVE" ]; then
          echo "##vso[task.logissue type=warning]No archive found – uploading raw directory"
          az storage blob upload-batch \
            --account-name $(STORAGE_ACCOUNT) \
            --destination $(CONTAINER_NAME) \
            --source "$BACKUP_ROOT" \
            --overwrite
        else
          # Place the archive alongside the _indexes/ directory
          BLOB_PREFIX=$(dirname "${ARCHIVE#"$BACKUP_ROOT/"}")
          az storage blob upload \
            --account-name $(STORAGE_ACCOUNT) \
            --container-name $(CONTAINER_NAME) \
            --name "$BLOB_PREFIX/backup.tar.gz" \
            --file "$ARCHIVE" \
            --overwrite
        fi
