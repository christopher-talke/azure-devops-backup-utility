name: ADO Backup

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * 0"  # Weekly on Sunday at 02:00 UTC

permissions:
  contents: read

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.10"

      - name: Install Azure DevOps extension
        # azure-cli is pre-installed on github-hosted ubuntu-latest runners
        run: az extension add -n azure-devops -y

      - name: Run ADO Backup
        env:
          AZURE_DEVOPS_EXT_PAT: ${{ secrets.ADO_PAT }}  # optional if az CLI is already authenticated
          AZURE_DEVOPS_ORG_URL: ${{ secrets.ADO_ORG_URL }}
        run: |
          export PYTHONPATH=src
          python src/cli.py \
            --output-dir "${{ github.workspace }}/ado-backup" \
            --max-items 500

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ado-backup
          path: ado-backup/
          retention-days: 30
